name: Build and Publish Docker Image

# This tells GitHub to run this robot every time you push to the 'main' branch
on:
  push:
    branches: ['main']

env:
  REGISTRY: ghcr.io
  # This automatically grabs your GitHub username and repo name
  IMAGE_NAME: ${{ github.repository }}
  # Tells GitHub to use the latest Node runtime, silencing the deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    
    # Grants the robot permission to upload the container to your GitHub account
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # This token is automatically provided by GitHub, no setup needed!
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}