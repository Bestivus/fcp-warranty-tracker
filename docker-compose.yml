services:
  fcp-tracker:
    image: ghcr.io/your-github-username/fcp-warranty-tracker:latest
    expose:
      - 3000
    volumes:
      - type: volume
        source: config
        target: /app/data
    networks:
      - proxy_network
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true" 
        - "traefik.http.routers.fcp-tracker.entrypoints=websecure"
        - "traefik.http.routers.fcp-tracker.rule=Host(`tracker.yourdomain.com`)" 
        - "traefik.http.routers.fcp-tracker.tls=true"
        - "traefik.http.services.fcp-tracker.loadbalancer.server.port=3000"

volumes:
  config:
    driver_opts:
      type: "nfs"
      o: "addr=192.168.X.X,nolock,soft,nfsvers=4"
      device: ":/mnt/your/nfs/path"

networks:
  proxy_network:
    external: true